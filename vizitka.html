<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Александр Васильев</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 40%, rgba(0, 120, 255, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 70%, rgba(120, 0, 255, 0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Particles */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      animation: float linear infinite;
    }

    @keyframes float {
      0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(-10vh) translateX(40px); opacity: 0; }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 56px 48px 48px;
      max-width: 440px;
      width: calc(100% - 32px);
      text-align: center;
      backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.05),
        0 32px 80px rgba(0,0,0,0.6),
        0 0 60px rgba(0,100,255,0.05);
      animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Avatar */
    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, #0062ff, #7b2fff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 700;
      color: #fff;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.08), 0 0 32px rgba(0,100,255,0.3);
      animation: pulseRing 3s ease-in-out infinite;
    }

    @keyframes pulseRing {
      0%, 100% { box-shadow: 0 0 0 3px rgba(255,255,255,0.08), 0 0 32px rgba(0,100,255,0.3); }
      50%       { box-shadow: 0 0 0 6px rgba(255,255,255,0.04), 0 0 48px rgba(0,100,255,0.5); }
    }

    /* Name */
    .name {
      font-size: clamp(28px, 6vw, 38px);
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.1;
      background: linear-gradient(135deg, #fff 0%, #a0c4ff 40%, #c084fc 80%, #fff 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite;
      margin-bottom: 12px;
    }

    @keyframes shimmer {
      0%   { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    /* Specialization */
    .spec {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    .spec::before, .spec::after {
      content: '';
      display: block;
      width: 24px;
      height: 1px;
      background: rgba(255,255,255,0.2);
    }

    /* Divider */
    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(0,100,255,0.6), transparent);
      margin: 0 auto 32px;
      border-radius: 2px;
    }

    /* Social icons */
    .socials {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 36px;
    }

    .social-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
    }

    .social-link::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--hover-bg);
      opacity: 0;
      transition: opacity 0.25s ease;
      border-radius: inherit;
    }

    .social-link:hover {
      transform: translateY(-4px) scale(1.1);
      color: #fff;
      border-color: rgba(255,255,255,0.2);
      box-shadow: 0 8px 24px var(--hover-shadow);
    }

    .social-link:hover::before { opacity: 1; }

    .social-link svg {
      position: relative;
      z-index: 1;
      width: 22px;
      height: 22px;
    }

    .social-link.telegram {
      --hover-bg: linear-gradient(135deg, rgba(0,136,204,0.3), rgba(0,168,255,0.2));
      --hover-shadow: rgba(0,136,204,0.4);
    }

    /* CTA Button */
    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 32px;
      border-radius: 14px;
      background: linear-gradient(135deg, #0062ff, #7b2fff);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      border: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease;
      box-shadow: 0 4px 24px rgba(0,98,255,0.3);
    }

    .cta::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #2979ff, #9c27b0);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .cta:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 8px 32px rgba(0,98,255,0.5);
    }

    .cta:hover::before { opacity: 1; }

    .cta:active { transform: scale(0.98); }

    .cta span, .cta svg { position: relative; z-index: 1; }

    /* Ripple */
    .cta .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transform: scale(0);
      animation: ripple 0.6s linear;
      pointer-events: none;
    }

    @keyframes ripple {
      to { transform: scale(4); opacity: 0; }
    }

    /* Football accent */
    .football-icon {
      position: absolute;
      top: -12px;
      right: 20px;
      font-size: 28px;
      animation: spin 8s linear infinite;
      opacity: 0.7;
    }

    @keyframes spin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Footer */
    .footer {
      margin-top: 28px;
      font-size: 12px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div class="particles" id="particles"></div>

  <div class="card">
    <div class="football-icon">⚽</div>

    <div class="avatar">АВ</div>

    <h1 class="name">Александр<br>Васильев</h1>

    <div class="spec">исследование футбола</div>

    <div class="divider"></div>

    <div class="socials">
      <!-- Telegram -->
      <a href="https://t.me/Almihvas1" class="social-link telegram" target="_blank" rel="noopener" title="Telegram">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.248-1.97 9.289c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L8.128 14.41l-2.967-.924c-.645-.204-.657-.645.136-.953l11.57-4.461c.537-.194 1.006.131.695.176z"/>
        </svg>
      </a>
    </div>

    <a href="https://t.me/Almihvas1" class="cta" target="_blank" rel="noopener" id="ctaBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.248-1.97 9.289c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L8.128 14.41l-2.967-.924c-.645-.204-.657-.645.136-.953l11.57-4.461c.537-.194 1.006.131.695.176z"/>
      </svg>
      <span>Написать мне</span>
    </a>

    <div class="footer">© 2026 Александр Васильев</div>
  </div>

  <script>
    // Particles
    const container = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDuration = (8 + Math.random() * 14) + 's';
      p.style.animationDelay = (Math.random() * 12) + 's';
      p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
      p.style.opacity = (0.1 + Math.random() * 0.4).toString();
      container.appendChild(p);
    }

    // Ripple on CTA
    document.getElementById('ctaBtn').addEventListener('click', function(e) {
      const btn = this;
      const rect = btn.getBoundingClientRect();
      const r = document.createElement('span');
      r.className = 'ripple';
      const size = Math.max(rect.width, rect.height);
      r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
      btn.appendChild(r);
      setTimeout(() => r.remove(), 700);
    });
  </script>

</body>
</html>
